services:
  - type: web
    name: menu-analysis
    env: static
    staticPublishPath: ./menu-analysis
    buildCommand: ""
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Cache-Control
        value: no-store
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
