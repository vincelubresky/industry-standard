<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jefferson County — 2-Week Population Menu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --navy:#0f172a; --navy2:#1e293b; --navy3:#334155;
  --border:#e2e8f0; --bg:#f8fafc; --text:#0f172a; --muted:#64748b;
  --bk:#b45309; --bk-bg:#fef3c7; --bk-bd:#fde68a;
  --lu:#0369a1; --lu-bg:#e0f2fe; --lu-bd:#bae6fd;
  --di:#15803d; --di-bg:#dcfce7; --di-bd:#bbf7d0;
  --prot:#1d4ed8; --prot-bg:#eff6ff; --prot-bd:#bfdbfe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.4}

/* ══ Print bar ══ */
.print-bar{background:var(--navy);color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.print-bar a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:600}
.print-bar a:hover{color:#fff}
.btn-print{background:#0369a1;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.02em}
.btn-print:hover{background:#0284c7}

/* ══ Header ══ */
.doc-header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#1e3a5f 100%);color:#fff;padding:24px 28px 20px}
.doc-header h1{font-size:22px;font-weight:900;letter-spacing:-.02em}
.doc-header p{color:#94a3b8;font-size:13px;margin-top:4px}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.meta-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px 12px;font-size:11px;color:#e2e8f0}

/* ══ Week tabs ══ */
.week-tabs{display:flex;background:var(--navy2);padding:0 20px;border-bottom:2px solid var(--border)}
.week-tab{background:none;border:none;color:#94a3b8;padding:12px 22px;font-size:13px;font-weight:800;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;letter-spacing:.02em}
.week-tab.active{color:#38bdf8;border-bottom-color:#38bdf8}
.week-tab:hover:not(.active){color:#e2e8f0}

/* ══ Body ══ */
.doc-body{padding:18px 20px 48px}
.week-block{display:none}.week-block.active{display:block}
.week-title{font-size:18px;font-weight:900;color:var(--navy);padding-bottom:10px;border-bottom:3px solid var(--border);margin-bottom:18px;letter-spacing:-.01em}

/* ══ Day cards ══ */
.days-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px}
.day-card{min-width:200px;flex:0 0 200px;border:2px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);background:#fff}
.day-card-hdr{background:var(--navy);color:#fff;padding:9px 14px;font-size:14px;font-weight:900;letter-spacing:.02em}
.meal-block{border-top:2px solid var(--border)}
.meal-block-hdr{padding:6px 12px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em}
.meal-block-hdr.bk{background:var(--bk-bg);color:var(--bk);border-bottom:1px solid var(--bk-bd)}
.meal-block-hdr.lu{background:var(--lu-bg);color:var(--lu);border-bottom:1px solid var(--lu-bd)}
.meal-block-hdr.di{background:var(--di-bg);color:var(--di);border-bottom:1px solid var(--di-bd)}
.meal-items{padding:6px 12px;background:#fff}
.meal-item{padding:4px 0;border-bottom:1px solid #f1f5f9}
.meal-item:last-child{border-bottom:none}
.mi-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.mi-name.prot{font-size:13px;font-weight:900;color:var(--prot);background:var(--prot-bg);padding:1px 5px;border-radius:4px;display:inline-block}
.mi-desc{font-size:10px;color:#475569;font-style:italic;margin-top:1px;line-height:1.3}
.mi-portion{font-size:10px;color:var(--muted);margin-top:2px}
.meal-sub{padding:4px 12px;font-size:10px;font-weight:800;text-align:right;border-top:1px solid}
.meal-sub.bk{background:var(--bk-bg);color:var(--bk);border-color:var(--bk-bd)}
.meal-sub.lu{background:var(--lu-bg);color:var(--lu);border-color:var(--lu-bd)}
.meal-sub.di{background:var(--di-bg);color:var(--di);border-color:var(--di-bd)}
.day-total{padding:8px 12px;background:var(--navy);color:#fff;font-size:11px;font-weight:900;text-align:center;letter-spacing:.02em}

/* ══ Print root (hidden on screen) ══ */
#print-root{display:none}

/* ══════════════════════════════════════
   PRINT — landscape, one full week per page
══════════════════════════════════════ */
@media print{
  @page{size:letter landscape;margin:.15in}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

  .print-bar,.week-tabs,.doc-header,.doc-body,#menu-root{display:none!important}
  body{margin:0;padding:0}
  #print-root{display:block!important}
  body{background:#fff}

  .pweek{page-break-after:always;page-break-inside:avoid}
  .pweek:last-child{page-break-after:auto}

  .pw-hdr{background:var(--navy)!important;color:#fff;padding:5pt 10pt;
          display:table;width:100%;border-radius:3pt 3pt 0 0}
  .pw-hdr-l{display:table-cell;vertical-align:middle}
  .pw-hdr-title{font-size:13pt;font-weight:900;letter-spacing:-.01em}
  .pw-hdr-sub{font-size:7pt;color:#94a3b8;margin-top:1pt}
  .pw-hdr-r{display:table-cell;text-align:right;vertical-align:middle;
            font-size:8pt;color:#cbd5e1;font-weight:700}

  .pw-tbl{width:100%;border-collapse:collapse;table-layout:fixed}
  .pw-tbl td,.pw-tbl th{border:1.5pt solid #94a3b8}

  .pw-day-hdr{background:var(--navy2)!important;color:#fff;font-size:11pt;font-weight:900;
              padding:5pt 4pt;text-align:center;letter-spacing:.02em}
  .pw-lbl-hdr{background:var(--navy2)!important;width:44pt}

  .pw-lbl{text-align:center;vertical-align:middle;padding:4pt 2pt;
          font-size:8pt;font-weight:900;text-transform:uppercase;letter-spacing:.05em;width:44pt;line-height:1.6}
  .pw-lbl.bk{background:var(--bk-bg)!important;color:var(--bk);border-right:2.5pt solid var(--bk-bd)}
  .pw-lbl.lu{background:var(--lu-bg)!important;color:var(--lu);border-right:2.5pt solid var(--lu-bd)}
  .pw-lbl.di{background:var(--di-bg)!important;color:var(--di);border-right:2.5pt solid var(--di-bd)}

  .pw-cell{padding:5pt 6pt;vertical-align:top}
  .pw-cell.bk{background:#fffdf5!important}
  .pw-cell.lu{background:#f0f8ff!important}
  .pw-cell.di{background:#f0fdf4!important}

  .pw-prot{font-size:12pt;font-weight:900;color:var(--prot);line-height:1.3;margin-bottom:3pt}
  .pw-side{font-size:10pt;font-weight:700;color:#1e293b;line-height:1.5}
  .pw-desc{font-size:7.5pt;color:#475569;font-style:italic;margin-top:2pt;line-height:1.3}

  .pw-legend{display:table;width:100%;background:#f1f5f9!important;
             border:1pt solid #94a3b8;border-top:none;padding:3pt 10pt}
  .pw-legend-inner{display:table-row}
  .pw-legend-l{display:table-cell;vertical-align:middle;font-size:7.5pt;font-weight:700;color:#475569}
  .pw-legend-r{display:table-cell;text-align:right;vertical-align:middle;
               font-style:italic;color:#94a3b8;font-size:7pt}
}
</style>
</head>
<body>

<!-- ══ SCREEN: Print bar ══ -->
<div class="print-bar">
  <a href="population-menu.html"><i class="fa-solid fa-arrow-left" style="margin-right:6px"></i>View w/ Vendors</a>
  <div style="font-size:13px;font-weight:800;color:#e2e8f0">Jefferson County · Population Menu</div>
  <button class="btn-print" onclick="window.print()"><i class="fa-solid fa-print" style="margin-right:6px"></i>Print Menu</button>

<!-- ══ SCREEN: Header ══ -->
<div class="doc-header">

  <div class="meta-row">
    <span class="meta-pill"><i class="fa-solid fa-calendar-week" style="margin-right:5px"></i>2-Week Rotation</span>

  </div>

<!-- ══ SCREEN: Week tabs ══ -->
<div class="week-tabs">
  <button class="week-tab active" onclick="showWeek(0,this)">Week 1</button>

<!-- ══ SCREEN: Content ══ -->
<div class="doc-body">
  <div id="menu-root"></div>
</div>

<!-- ══ PRINT: All days (hidden on screen) ══ -->
<div id="print-root"></div>

  [I.egg,    I.grits,   I.biscuit,I.jelly,I.fortBev,I.cakeLg],
  [I.sausage,I.egg,     I.grits,  I.fortBev,I.cakeLg],
  [I.egg,    I.sausage, I.oatmeal,I.fortBev,I.cakeLg],

const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WEEKS=[

     [I.turkey,   I.wheatBr2,I.mustard,I.carrots,  I.pastaSal, I.fortBev,I.cookieOat],

function tot(items){
  if(!items)return{cal:0,cost:0};
  return{cal:items.reduce((s,i)=>s+i[2],0),cost:items.reduce((s,i)=>s+i[4],0)};
}

/* ══ SCREEN ══ */
function screenCard(dayName,bk,lu,di){
  const tb=tot(bk),tl=tot(lu),td=tot(di);
  const totalCal=tb.cal+tl.cal+td.cal;

  function itemsHtml(items){
    const rows=items.map(it=>{
      const[n,p,c,,,$,isProt,desc]=it;
      return `<div class="meal-item">
        <div class="mi-name${isProt?' prot':''}">${isProt?'★ ':''}${n}</div>
        ${desc?`<div class="mi-desc">${desc}</div>`:''}
        <div class="mi-portion">${p} &nbsp;·&nbsp; ${c} cal</div>
      </div>`;
    }).join('');
    return `<div class="meal-items">${rows}</div>`;
  }

  return `<div class="day-card">
    <div class="day-card-hdr">${dayName}</div>
    <div class="meal-block">
      <div class="meal-block-hdr bk">☀ Breakfast</div>
      ${itemsHtml(bk)}
      <div class="meal-sub bk">${tb.cal} cal</div>
    </div>
    <div class="meal-block">
      <div class="meal-block-hdr lu">🥪 Lunch (Sandwich)</div>
      ${itemsHtml(lu)}
      <div class="meal-sub lu">${tl.cal} cal</div>
    </div>
    <div class="meal-block">
      <div class="meal-block-hdr di">🔥 Dinner (Hot)</div>
      ${itemsHtml(di)}
      <div class="meal-sub di">${td.cal} cal</div>
    </div>
    <div class="day-total">${totalCal} cal total</div>
  </div>`;
}

function renderScreen(){
  const root=document.getElementById('menu-root');
  let html='';
  WEEKS.forEach((wk,wi)=>{
    html+=`<div class="week-block${wi===0?' active':''}" id="week-${wi}">
      <div class="week-title">${wk.title} &nbsp;<span style="color:var(--muted);font-size:13px;font-weight:500">Monday – Sunday · 2-week repeating cycle</span></div>
      <div class="days-scroll">`;
    DAYS.forEach((day,di)=>{
      html+=screenCard(day,wk.bk[di],wk.lunch[di],wk.dinner[di]);
    });
    html+=`</div></div>`;
  });
  root.innerHTML=html;
}

/* ══ PRINT — landscape grid, one full week per page ══ */
function renderPrint(){
  const root=document.getElementById('print-root');
  let html='';
  WEEKS.forEach((wk,wi)=>{
    html+=`<div class="pweek">
      <div class="pw-hdr">
        <div class="pw-hdr-l">
          <div class="pw-hdr-title">Jefferson County Population Menu &nbsp;·&nbsp; ${wk.title} of 2</div>
          <div class="pw-hdr-sub">Industry Standard Food Service &nbsp;·&nbsp; 2-Week Repeating Rotation &nbsp;·&nbsp; Internal Reference</div>
        </div>
        <div class="pw-hdr-r">★ = Primary Protein</div>
      </div>
      <table class="pw-tbl">
        <colgroup>
          <col style="width:38pt">
          ${DAYS.map(()=>'<col>').join('')}
        </colgroup>
        <tr>
          <th class="pw-lbl-hdr"></th>
          ${DAYS.map(d=>`<th class="pw-day-hdr">${d.toUpperCase()}</th>`).join('')}
        </tr>
        <!-- BREAKFAST -->
        <tr>
          <td class="pw-lbl bk">☀<br>BREAK<br>FAST</td>
          ${DAYS.map((_,di)=>{
            const items=wk.bk[di];
            const prot=items.find(it=>it[5]);
            const sides=items.filter(it=>!it[5]);
            return `<td class="pw-cell bk">
              <div class="pw-prot">★ ${prot?prot[0]:'—'}</div>
              ${sides.map(it=>`<div class="pw-side">${it[0]}</div>`).join('')}
            </td>`;
          }).join('')}
        </tr>
        <!-- LUNCH -->
        <tr>
          <td class="pw-lbl lu">🥪<br>LUNCH<br>(SAND)</td>
          ${DAYS.map((_,di)=>{
            const items=wk.lunch[di];
            if(!items) return `<td class="pw-warn">⚠ REVIEW</td>`;
            const prot=items.find(it=>it[5]);
            const sides=items.filter(it=>!it[5]);
            return `<td class="pw-cell lu">
              <div class="pw-prot">★ ${prot?prot[0]:'—'}</div>
              ${sides.map(it=>`<div class="pw-side">${it[0]}</div>`).join('')}
            </td>`;
          }).join('')}
        </tr>
        <!-- DINNER -->
        <tr>
          <td class="pw-lbl di">🔥<br>DINNER<br>(HOT)</td>
          ${DAYS.map((_,di)=>{
            const items=wk.dinner[di];
            const prot=items.find(it=>it[5]);
            const sides=items.filter(it=>!it[5]);
            return `<td class="pw-cell di">
              <div class="pw-prot">★ ${prot?prot[0]:'—'}</div>
              ${prot&&prot[6]?`<div class="pw-desc">${prot[6]}</div>`:''}
              ${sides.map(it=>`<div class="pw-side">${it[0]}</div>`).join('')}
            </td>`;
          }).join('')}
        </tr>
      </table>
      <div class="pw-legend">
        <div class="pw-legend-inner">
          <div class="pw-legend-l">Jefferson County Department of Corrections &nbsp;·&nbsp; 2-Week Repeating Menu</div>
          <div class="pw-legend-r">Industry Standard Food Service · Internal Use Only</div>
        </div>
      </div>
    </div>`;
  });
  root.innerHTML=html;
}

function downloadMenu(){
  document.title='Jefferson-County-Menu-Clean';
  window.print();
  document.title='Jefferson County — 2-Week Population Menu';
}
function showWeek(n,btn){
  document.querySelectorAll('.week-block').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('week-'+n).classList.add('active');
  btn.classList.add('active');
}

renderScreen();
renderPrint();
</script>
</body>
</html>
